; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; ═══════════════ HOW TO ADD A NEW DEVICE ═══════════════
; 1. Copy any [env:device-xxx] section below
; 2. Change the env name and DEVICE_ID to something unique
; 3. Set upload_port to the COM port of that board
; 4. Flash with:  pio run -e <env-name> -t upload
;
; Example:
;   [env:garage-hose-01]
;   extends = common
;   build_flags = ${common.build_flags} -DDEVICE_ID='"garage-hose-01"'
;   upload_port = COM5

; ─── Shared settings ───
[common]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	madhephaestus/ESP32Servo @ ^1.2.1
	bblanchon/ArduinoJson @ ^6.21.5
build_flags =
	-DWIFI_SSID='"Wokwi-GUEST"'
	-DWIFI_PASSWORD='""'
	-DSERVER_URL='"http://host.wokwi.internal:3000/api/data"'

; ─── Device 1: Kitchen Sink ───
[env:kitchen-sink-01]
extends = common
build_flags = ${common.build_flags} -DDEVICE_ID='"kitchen-sink-01"'

; ─── Device 2: Bathroom Faucet ───
[env:bathroom-faucet-01]
extends = common
build_flags = ${common.build_flags} -DDEVICE_ID='"bathroom-faucet-01"'

; ─── Device 3: Garden Hose ───
[env:garden-hose-01]
extends = common
build_flags = ${common.build_flags} -DDEVICE_ID='"garden-hose-01"'

